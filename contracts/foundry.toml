[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
fs_permissions = [{ access = "read", path = "./test" }, { access = "read", path = "./proofs" }]

optimizer = true
optimizer_runs = 200
# HonkVerifier (bb-generated) is 24642 bytes — 66 over mainnet limit.
# Raise to 25000 for local Anvil dev. Real deployments use L2s (no size limit).
evm_version = "cancun"
